<!DOCTYPE html>
<html>

<head>
<title>Volunteer - The Luminous Foundation</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

form{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h1>Become a Volunteer</h1>

<form>

<input type="text" placeholder="Full Name" required><br><br>

<input type="email" placeholder="Email Address" required><br><br>

<input type="text" placeholder="Country"><br><br>

<textarea placeholder="Why do you want to volunteer?" rows="4"></textarea><br><br>

<button type="submit">Submit</button>

</form>

</body>

</html>
